name: Security Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
        pip install -r requirements.txt
    
    - name: Run safety check
      run: safety check --json || true
    
    - name: Run bandit security scan
      run: bandit -r . -f json -o bandit-report.json || true
    
    - name: Check for secrets
      run: |
        if grep -r "gsk_" --include="*.py" --include="*.txt" --exclude-dir=".venv" .; then
          echo "ERROR: Potential API key found in code!"
          exit 1
        fi
        echo "No secrets detected in code"
    
    - name: Verify .env is gitignored
      run: |
        if git check-ignore .env; then
          echo ".env is properly gitignored"
        else
          echo "ERROR: .env is not gitignored!"
          exit 1
        fi
