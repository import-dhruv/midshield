version: '3.8'

services:
  api:
    build: .
    container_name: midshield-api
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LOG_PATH=/app/logs/audit.jsonl
    volumes:
      - ./logs:/app/logs
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  dashboard:
    build: .
    container_name: midshield-dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      - LOG_PATH=/app/logs/audit.jsonl
    volumes:
      - ./logs:/app/logs
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped

volumes:
  logs:
