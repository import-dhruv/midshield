services:
  - type: web
    name: midshield-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LOG_PATH
        value: audit.jsonl
    healthCheckPath: /health

  - type: web
    name: midshield-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: midshield-api
          property: host
      - key: LOG_PATH
        value: audit.jsonl
